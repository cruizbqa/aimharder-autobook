name: AimHarder Auto-Booking

# ──────────────────────────────────────────────────────────────────────
# LÓGICA DE VENTANA 72 h
#
# AimHarder abre reservas exactamente 72 h antes de la clase (07:00h España).
# El cron dispara a las 07:00h hora española en punto:
#   - Invierno CET  (UTC+1) → 06:00 UTC
#   - Verano  CEST  (UTC+2) → 05:00 UTC
#
# Activamos los 8 crons (4 días × 2 zonas horarias). El script detecta
# si "ahora en Madrid" son las 07:xx; si el runner arranca tarde por
# carga de GH, el retry con backoff exponencial reintenta hasta 5 veces.
#
# Clase objetivo    Cron dispara   CET (invierno)   CEST (verano)
# ──────────────    ────────────   ──────────────   ─────────────
# WOD Lunes 07:00   Viernes        0 6 * * 5        0 5 * * 5
# WOD Martes 07:00  Sábado         0 6 * * 6        0 5 * * 6
# WOD Jueves 07:00  Lunes          0 6 * * 1        0 5 * * 1
# WOD Viernes 07:00 Martes         0 6 * * 2        0 5 * * 2
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Invierno CET (UTC+1) — hora UTC 06:00
    - cron: "0 6 * * 5"   # WOD Lunes   → corre Viernes  06:00 UTC
    - cron: "0 6 * * 6"   # WOD Martes  → corre Sábado   06:00 UTC
    - cron: "0 6 * * 1"   # WOD Jueves  → corre Lunes    06:00 UTC
    - cron: "0 6 * * 2"   # WOD Viernes → corre Martes   06:00 UTC
    # Verano CEST (UTC+2) — hora UTC 05:00
    - cron: "0 5 * * 5"   # WOD Lunes   → corre Viernes  05:00 UTC
    - cron: "0 5 * * 6"   # WOD Martes  → corre Sábado   05:00 UTC
    - cron: "0 5 * * 1"   # WOD Jueves  → corre Lunes    05:00 UTC
    - cron: "0 5 * * 2"   # WOD Viernes → corre Martes   05:00 UTC

  workflow_dispatch:
    inputs:
      target_hours:
        description: "Horas hacia adelante para calcular la fecha de la clase"
        required: false
        default: "72"
      class_time:
        description: "Hora de la clase HHMM"
        required: false
        default: "0700"
      class_name:
        description: "Fragmento del nombre de la clase"
        required: false
        default: "WOD"
      retry_attempts:
        description: "Número máximo de reintentos"
        required: false
        default: "5"

# Sin solapamientos entre runs
concurrency:
  group: aimharder-booking
  cancel-in-progress: false

jobs:
  book:
    name: "Reservar WOD CrossFit — ventana 72 h"
    runs-on: ubuntu-latest
    timeout-minutes: 15   # margen para reintentos con backoff

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execution context
        run: |
          echo "Triggered by : ${{ github.event_name }}"
          echo "UTC now      : $(date -u '+%Y-%m-%d %H:%M %Z')"
          echo "Spain now    : $(TZ='Europe/Madrid' date '+%Y-%m-%d %H:%M %Z')"
          echo "Spain weekday: $(TZ='Europe/Madrid' date '+%A')"

      - name: Run auto-booking
        env:
          EMAIL:    ${{ secrets.AIMHARDER_EMAIL }}
          PASSWORD: ${{ secrets.AIMHARDER_PASSWORD }}
          BOX_NAME: ${{ secrets.BOX_NAME }}
          BOX_ID:   ${{ secrets.BOX_ID }}

          TARGET_HOURS: ${{ github.event.inputs.target_hours || '72' }}
          CLASS_TIME:   ${{ github.event.inputs.class_time   || '0700' }}
          CLASS_NAME:   ${{ github.event.inputs.class_name   || 'WOD' }}

          # Reintentos con backoff exponencial
          # 5 intentos: esperas 10s → 20s → 40s → 80s ≈ 2.5 min total
          RETRY_ATTEMPTS:      ${{ github.event.inputs.retry_attempts || '5' }}
          RETRY_DELAY_SECONDS: "10"
          RETRY_BACKOFF:       "2"

          FAMILY_ID: ${{ secrets.FAMILY_ID }}
          PROXY:     ${{ secrets.PROXY }}

        run: |
          cd src
          python main.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Todos los reintentos fallaron. Reserva no completada."
