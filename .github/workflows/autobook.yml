name: AimHarder Auto-Booking

# ──────────────────────────────────────────────────────────────────────
# LÓGICA DE VENTANA 72 h
#
# AimHarder abre reservas exactamente 72 h antes de la clase (07:00h España).
#
# El script en src/main.py valida que sea exactamente las 07:xx en Madrid.
# Por tanto, aunque programamos los crons para Invierno (06:00 UTC) y
# Verano (05:00 UTC), el script descartará automáticamente la ejecución
# que no corresponda con las 07:00 AM hora local.
#
# Clase objetivo    Cron dispara   CET (invierno)   CEST (verano)
# ──────────────    ────────────   ──────────────   ─────────────
# WOD Lunes 07:00   Viernes        45 5 * * 5       45 4 * * 5
# WOD Martes 07:00  Sábado         45 5 * * 6       45 4 * * 6
# WOD Jueves 07:00  Lunes          45 5 * * 1       45 4 * * 1
# WOD Viernes 07:00 Martes         45 5 * * 2       45 4 * * 2
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Invierno CET (UTC+1) — arranca 06:45 local (05:45 UTC)
    - cron: "45 5 * * 5"   # WOD Lunes   → corre Viernes
    - cron: "45 5 * * 6"   # WOD Martes  → corre Sábado
    - cron: "45 5 * * 1"   # WOD Jueves  → corre Lunes
    - cron: "45 5 * * 2"   # WOD Viernes → corre Martes
    # Verano CEST (UTC+2) — arranca 06:45 local (04:45 UTC)
    - cron: "45 4 * * 5"   # WOD Lunes   → corre Viernes
    - cron: "45 4 * * 6"   # WOD Martes  → corre Sábado
    - cron: "45 4 * * 1"   # WOD Jueves  → corre Lunes
    - cron: "45 4 * * 2"   # WOD Viernes → corre Martes

  workflow_dispatch:
    inputs:
      target_hours:
        description: "Horas hacia adelante para calcular la fecha de la clase"
        required: false
        default: "72"
      class_time:
        description: "Hora de la clase HHMM"
        required: false
        default: "0700"
      class_name:
        description: "Fragmento del nombre de la clase"
        required: false
        default: "CrossFit"
      retry_attempts:
        description: "Número máximo de reintentos"
        required: false
        default: "5"

# Sin solapamientos entre runs
concurrency:
  group: aimharder-booking
  cancel-in-progress: false

jobs:
  book:
    name: "Reservar WOD CrossFit — ventana 72 h"
    runs-on: ubuntu-latest
    timeout-minutes: 15   # margen para reintentos con backoff

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Execution context
        run: |
          echo "Triggered by : ${{ github.event_name }}"
          echo "UTC now      : $(date -u '+%Y-%m-%d %H:%M %Z')"
          echo "Spain now    : $(TZ='Europe/Madrid' date '+%Y-%m-%d %H:%M %Z')"
          echo "Spain weekday: $(TZ='Europe/Madrid' date '+%A')"

      - name: Run auto-booking
        env:
          EMAIL:    ${{ secrets.AIMHARDER_EMAIL }}
          PASSWORD: ${{ secrets.AIMHARDER_PASSWORD }}
          BOX_NAME: ${{ secrets.BOX_NAME }}
          BOX_ID:   ${{ secrets.BOX_ID }}

          TARGET_HOURS: ${{ github.event.inputs.target_hours || '72' }}
          CLASS_TIME:   ${{ github.event.inputs.class_time   || '0700' }}
          CLASS_NAME:   ${{ github.event.inputs.class_name   || 'CrossFit' }}

          # Reintentos con backoff exponencial
          # 5 intentos: esperas 10s → 20s → 40s → 80s ≈ 2.5 min total
          RETRY_ATTEMPTS:      ${{ github.event.inputs.retry_attempts || '5' }}
          RETRY_DELAY_SECONDS: "10"
          RETRY_BACKOFF:       "2"

          FAMILY_ID: ${{ secrets.FAMILY_ID }}
          PROXY:     ${{ secrets.PROXY }}
          
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: |
          python -m src.main

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Todos los reintentos fallaron. Reserva no completada."
