name: AimHarder Auto-Booking

# ──────────────────────────────────────────────────────────────────────
# DISPARO EXTERNO (CRON-JOB.ORG)
#
# Este workflow se dispara mediante la API de GitHub (workflow_dispatch).
# Se recomienda usar cron-job.org para una precisión de segundos y
# evitar los retrasos del scheduler nativo de GitHub.
#
# Horario recomendado en cron-job.org: 07:00:05 (Europe/Madrid)
# ──────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      target_hours:
        description: "Horas hacia adelante para calcular la fecha de la clase"
        required: false
        default: "72"
      class_time:
        description: "Hora de la clase HHMM"
        required: false
        default: "0700"
      class_name:
        description: "Fragmento del nombre de la clase"
        required: false
        default: "CrossFit"
      retry_attempts:
        description: "Número máximo de reintentos"
        required: false
        default: "5"

# Evita solapamientos entre ejecuciones
concurrency:
  group: aimharder-booking
  cancel-in-progress: false

jobs:
  book:
    name: "Reservar clase AimHarder"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Execution context
        run: |
          echo "Triggered by : ${{ github.event_name }}"
          echo "UTC now      : $(date -u '+%Y-%m-%d %H:%M %Z')"
          echo "Spain now    : $(TZ='Europe/Madrid' date '+%Y-%m-%d %H:%M %Z')"
          echo "Spain weekday: $(TZ='Europe/Madrid' date '+%A')"

      - name: Run auto-booking
        env:
          EMAIL: ${{ secrets.AIMHARDER_EMAIL }}
          PASSWORD: ${{ secrets.AIMHARDER_PASSWORD }}
          BOX_NAME: ${{ secrets.BOX_NAME }}
          BOX_ID: ${{ secrets.BOX_ID }}

          TARGET_HOURS: ${{ github.event.inputs.target_hours || '72' }}
          CLASS_TIME: ${{ github.event.inputs.class_time || '0700' }}
          CLASS_NAME: ${{ github.event.inputs.class_name || 'CrossFit' }}

          # Reintentos con backoff exponencial
          # 5 intentos: 10s -> 20s -> 40s -> 80s
          RETRY_ATTEMPTS: ${{ github.event.inputs.retry_attempts || '5' }}
          RETRY_DELAY_SECONDS: "10"
          RETRY_BACKOFF: "2"

          FAMILY_ID: ${{ secrets.FAMILY_ID }}
          PROXY: ${{ secrets.PROXY }}

          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: |
          python -m src.main

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Todos los reintentos fallaron. Reserva no completada."
