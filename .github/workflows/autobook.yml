name: AimHarder Auto-Booking

# ──────────────────────────────────────────────────────────────────────
# EJECUCIÓN DIARIA + CONTROL HORARIO EN PYTHON
#
# Este workflow se dispara TODOS los días dos veces:
#   - 05:45 UTC  -> cubre CEST / verano (06:45 local no, 07:45? no usar)
#   - 04:45 UTC  -> cubre? NO
#
# OJO:
# GitHub Actions usa UTC en schedule. Como el script Python trabaja con
# Europe/Madrid y ya decide cómo comportarse según la hora local, aquí
# programamos una ejecución diaria para cada horario estacional:
#
#   - Invierno (CET, UTC+1): 05:45 UTC = 06:45 Madrid
#   - Verano   (CEST, UTC+2): 04:45 UTC = 06:45 Madrid
#
# El script en src/main.py:
#   - si arranca entre 06:40 y 06:59 en Madrid, espera hasta las 07:00:01
#   - fuera de esa ventana, continúa igualmente
#
# Así:
#   - no tocamos lógica de negocio
#   - mantenemos flexibilidad vía workflow_dispatch inputs
#   - evitamos depender de días concretos en el cron
#
# IMPORTANTE:
# Al ejecutarse todos los días, habrá días en los que el proceso corra aunque
# luego no haya una reserva útil para realizar. Esa decisión queda delegada a
# la lógica actual de Python y a las variables del workflow.
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Invierno CET (UTC+1) -> 06:45 hora Madrid
    - cron: "45 5 * * *"

    # Verano CEST (UTC+2) -> 06:45 hora Madrid
    - cron: "45 4 * * *"

  workflow_dispatch:
    inputs:
      target_hours:
        description: "Horas hacia adelante para calcular la fecha de la clase"
        required: false
        default: "72"
      class_time:
        description: "Hora de la clase HHMM"
        required: false
        default: "0700"
      class_name:
        description: "Fragmento del nombre de la clase"
        required: false
        default: "CrossFit"
      retry_attempts:
        description: "Número máximo de reintentos"
        required: false
        default: "5"

# Evita solapamientos entre ejecuciones
concurrency:
  group: aimharder-booking
  cancel-in-progress: false

jobs:
  book:
    name: "Reservar clase AimHarder"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Execution context
        run: |
          echo "Triggered by : ${{ github.event_name }}"
          echo "UTC now      : $(date -u '+%Y-%m-%d %H:%M %Z')"
          echo "Spain now    : $(TZ='Europe/Madrid' date '+%Y-%m-%d %H:%M %Z')"
          echo "Spain weekday: $(TZ='Europe/Madrid' date '+%A')"

      - name: Run auto-booking
        env:
          EMAIL: ${{ secrets.AIMHARDER_EMAIL }}
          PASSWORD: ${{ secrets.AIMHARDER_PASSWORD }}
          BOX_NAME: ${{ secrets.BOX_NAME }}
          BOX_ID: ${{ secrets.BOX_ID }}

          TARGET_HOURS: ${{ github.event.inputs.target_hours || '72' }}
          CLASS_TIME: ${{ github.event.inputs.class_time || '0700' }}
          CLASS_NAME: ${{ github.event.inputs.class_name || 'CrossFit' }}

          # Reintentos con backoff exponencial
          # 5 intentos: 10s -> 20s -> 40s -> 80s
          RETRY_ATTEMPTS: ${{ github.event.inputs.retry_attempts || '5' }}
          RETRY_DELAY_SECONDS: "10"
          RETRY_BACKOFF: "2"

          FAMILY_ID: ${{ secrets.FAMILY_ID }}
          PROXY: ${{ secrets.PROXY }}

          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: |
          python -m src.main

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Todos los reintentos fallaron. Reserva no completada."
